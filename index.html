<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>Readative — Read. Write. Learn. Grow.</title>
    <meta name="description" content="Readative is a social reading and writing platform. Share stories, poems, motivational posts, ask questions in SmartTalk, and test yourself with AI-generated reading exams." />
    <meta name="keywords" content="reading platform, writing community, stories, poems, shayari, motivation, SmartTalk Q&A, reading exam, Readative" />
    <meta name="author" content="Readative" />
    <link rel="canonical" href="https://readative.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://readative.com/" />
    <meta property="og:title" content="Readative — Read. Write. Learn. Grow." />
    <meta property="og:description" content="A social reading and writing platform. Share stories, poems, ask questions and test your knowledge with AI exams." />
    <meta property="og:image" content="https://readative.com/og-image.png" />
    <meta property="og:site_name" content="Readative" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://readative.com/" />
    <meta name="twitter:title" content="Readative — Read. Write. Learn. Grow." />
    <meta name="twitter:description" content="A social reading and writing platform. Share stories, poems, ask questions and test your knowledge with AI exams." />
    <meta name="twitter:image" content="https://readative.com/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#10b981" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Readative" />

    <!-- Robots -->
    <meta name="robots" content="index, follow" />
    <meta name="googlebot" content="index, follow" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Readative",
      "url": "https://readative.com",
      "description": "A social reading and writing platform where users share stories, poems, shayari, motivation and test their reading knowledge.",
      "applicationCategory": "SocialNetworkingApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "author": {
        "@type": "Organization",
        "name": "Readative",
        "url": "https://readative.com"
      },
      "featureList": [
        "Share stories, poems, shayari and motivational posts",
        "Community Q&A with SmartTalk",
        "AI-powered reading exam",
        "Like, comment and share posts",
        "Follow your favourite writers"
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
